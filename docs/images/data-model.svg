<svg width="680" height="380" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Brewery -->
  <rect x="40" y="40" width="175" height="180" rx="8" fill="#e6faf5" stroke="#5dcaa5" stroke-width="1"/>
  <text x="128" y="64" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">Brewery</text>
  <line x1="40" y1="74" x2="215" y2="74" stroke="#5dcaa5" stroke-width="0.5"/>
  <text x="55" y="96" font-size="11" fill="#444">id</text>
  <text x="55" y="114" font-size="11" fill="#444">name</text>
  <text x="55" y="132" font-size="11" fill="#444">city · country</text>
  <text x="55" y="150" font-size="11" fill="#444">latitude · longitude</text>
  <text x="55" y="168" font-size="11" fill="#444">type</text>
  <text x="55" y="186" font-size="11" fill="#444">foundedYear</text>
  <text x="55" y="204" font-size="11" fill="#444">website</text>

  <!-- 1:N Brewery → Beer -->
  <line x1="215" y1="140" x2="265" y2="140" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="224" y="132" font-size="11" fill="#1D9E75">1</text>
  <text x="246" y="132" font-size="11" fill="#1D9E75">N</text>

  <!-- Beer -->
  <rect x="265" y="40" width="175" height="210" rx="8" fill="#fff0ec" stroke="#f4a88a" stroke-width="1"/>
  <text x="353" y="64" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">Beer</text>
  <line x1="265" y1="74" x2="440" y2="74" stroke="#f4a88a" stroke-width="0.5"/>
  <text x="280" y="96" font-size="11" fill="#444">id</text>
  <text x="280" y="114" font-size="11" fill="#444">name</text>
  <text x="280" y="132" font-size="11" fill="#444">breweryId → Brewery</text>
  <text x="280" y="150" font-size="11" fill="#444">styleId → BeerStyle</text>
  <text x="280" y="168" font-size="11" fill="#444">abv</text>
  <text x="280" y="186" font-size="11" fill="#444">ibu</text>
  <text x="280" y="204" font-size="11" fill="#444">description</text>
  <text x="280" y="222" font-size="11" fill="#444">isActive</text>

  <!-- N:1 Beer → BeerStyle -->
  <line x1="440" y1="110" x2="490" y2="110" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="448" y="102" font-size="11" fill="#993C1D">N</text>
  <text x="470" y="102" font-size="11" fill="#993C1D">1</text>

  <!-- BeerStyle -->
  <rect x="490" y="40" width="160" height="120" rx="8" fill="#fef9ec" stroke="#f0c060" stroke-width="1"/>
  <text x="570" y="64" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">BeerStyle</text>
  <line x1="490" y1="74" x2="650" y2="74" stroke="#f0c060" stroke-width="0.5"/>
  <text x="505" y="96" font-size="11" fill="#444">id</text>
  <text x="505" y="114" font-size="11" fill="#444">name</text>
  <text x="505" y="132" font-size="11" fill="#444">description</text>
  <text x="505" y="150" font-size="11" fill="#444">origin</text>

  <!-- Beer → BeerIngredient -->
  <line x1="353" y1="250" x2="353" y2="285" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="358" y="272" font-size="11" fill="#993C1D">N</text>

  <!-- BeerIngredient -->
  <rect x="265" y="285" width="175" height="55" rx="8" fill="#edfaee" stroke="#5dca6a" stroke-width="1"/>
  <text x="353" y="308" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">BeerIngredient</text>
  <text x="353" y="328" font-size="11" fill="#444" text-anchor="middle">beerId · ingredientId</text>

  <!-- BeerIngredient → Ingredient -->
  <line x1="440" y1="312" x2="475" y2="312" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="447" y="304" font-size="11" fill="#3B6D11">N</text>
  <text x="463" y="304" font-size="11" fill="#3B6D11">1</text>

  <!-- Ingredient -->
  <rect x="475" y="270" width="155" height="85" rx="8" fill="#edfaee" stroke="#5dca6a" stroke-width="1"/>
  <text x="553" y="294" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">Ingredient</text>
  <line x1="475" y1="304" x2="630" y2="304" stroke="#5dca6a" stroke-width="0.5"/>
  <text x="490" y="322" font-size="11" fill="#444">id</text>
  <text x="490" y="340" font-size="11" fill="#444">name</text>
</svg>
