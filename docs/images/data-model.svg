<svg width="700" height="400" viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Brewery -->
  <rect x="30" y="30" width="190" height="270" rx="8" fill="#e6faf5" stroke="#5dcaa5" stroke-width="1"/>
  <text x="125" y="54" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">Brewery</text>
  <line x1="30" y1="64" x2="220" y2="64" stroke="#5dcaa5" stroke-width="0.5"/>
  <text x="45" y="86" font-size="11" fill="#444">id</text>
  <text x="45" y="104" font-size="11" fill="#444">name</text>
  <text x="45" y="122" font-size="11" fill="#444">city?</text>
  <text x="45" y="140" font-size="11" fill="#444">street? · postalCode?</text>
  <text x="45" y="158" font-size="11" fill="#444">phone?</text>
  <text x="45" y="176" font-size="11" fill="#444">country</text>
  <text x="45" y="194" font-size="11" fill="#444">latitude? · longitude?</text>
  <text x="45" y="212" font-size="11" fill="#444">foundedYear?</text>
  <text x="45" y="230" font-size="11" fill="#444">website?</text>
  <text x="45" y="248" font-size="11" fill="#444">description?</text>
  <text x="45" y="266" font-size="11" fill="#444">wikidataId?</text>
  <text x="45" y="284" font-size="11" fill="#444">createdAt</text>

  <!-- 1:N Brewery → Beer -->
  <line x1="220" y1="160" x2="270" y2="160" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="229" y="152" font-size="11" fill="#1D9E75">1</text>
  <text x="251" y="152" font-size="11" fill="#1D9E75">N</text>

  <!-- Beer -->
  <rect x="270" y="60" width="175" height="210" rx="8" fill="#fff0ec" stroke="#f4a88a" stroke-width="1"/>
  <text x="358" y="84" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">Beer</text>
  <line x1="270" y1="94" x2="445" y2="94" stroke="#f4a88a" stroke-width="0.5"/>
  <text x="285" y="116" font-size="11" fill="#444">id</text>
  <text x="285" y="134" font-size="11" fill="#444">name</text>
  <text x="285" y="152" font-size="11" fill="#444">breweryId → Brewery</text>
  <text x="285" y="170" font-size="11" fill="#444">styleId → BeerStyle</text>
  <text x="285" y="188" font-size="11" fill="#444">abv?</text>
  <text x="285" y="206" font-size="11" fill="#444">ibu?</text>
  <text x="285" y="224" font-size="11" fill="#444">description?</text>
  <text x="285" y="242" font-size="11" fill="#444">createdAt</text>

  <!-- N:1 Beer → BeerStyle -->
  <line x1="445" y1="130" x2="495" y2="130" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="453" y="122" font-size="11" fill="#993C1D">N</text>
  <text x="475" y="122" font-size="11" fill="#993C1D">1</text>

  <!-- BeerStyle -->
  <rect x="495" y="60" width="160" height="100" rx="8" fill="#fef9ec" stroke="#f0c060" stroke-width="1"/>
  <text x="575" y="84" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">BeerStyle</text>
  <line x1="495" y1="94" x2="655" y2="94" stroke="#f0c060" stroke-width="0.5"/>
  <text x="510" y="116" font-size="11" fill="#444">id</text>
  <text x="510" y="134" font-size="11" fill="#444">name</text>
  <text x="510" y="152" font-size="11" fill="#444">description?</text>

  <!-- Beer → BeerIngredient -->
  <line x1="358" y1="270" x2="358" y2="305" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="363" y="292" font-size="11" fill="#993C1D">N</text>

  <!-- BeerIngredient -->
  <rect x="270" y="305" width="175" height="55" rx="8" fill="#edfaee" stroke="#5dca6a" stroke-width="1"/>
  <text x="358" y="328" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">BeerIngredient</text>
  <text x="358" y="348" font-size="11" fill="#444" text-anchor="middle">beerId · ingredientId</text>

  <!-- BeerIngredient → Ingredient -->
  <line x1="445" y1="332" x2="480" y2="332" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="452" y="324" font-size="11" fill="#3B6D11">N</text>
  <text x="468" y="324" font-size="11" fill="#3B6D11">1</text>

  <!-- Ingredient -->
  <rect x="480" y="290" width="155" height="85" rx="8" fill="#edfaee" stroke="#5dca6a" stroke-width="1"/>
  <text x="558" y="314" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">Ingredient</text>
  <line x1="480" y1="324" x2="635" y2="324" stroke="#5dca6a" stroke-width="0.5"/>
  <text x="495" y="342" font-size="11" fill="#444">id</text>
  <text x="495" y="360" font-size="11" fill="#444">name</text>

  <!-- Legend -->
  <text x="30" y="390" font-size="10" fill="#888780">? = optional field</text>
</svg>
